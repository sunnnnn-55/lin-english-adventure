<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ffc64d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="林律英文小冒險" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>林律英文小冒險｜第 1 集</title>
  <style>
    :root{--ink:#2b2640;--cream:#fffaf1;--gold:#ffc64d;--orange:#ff8c5a;--pink:#ff6f92;--green:#58c58a;--shadow:0 14px 34px rgba(72,44,24,.18)}
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% 0,#fff0b8 0,#fffaf1 35%,#fff 100%);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;color:var(--ink)}
    button{font:inherit;border:0;cursor:pointer;-webkit-tap-highlight-color:transparent}.app{width:min(100%,520px);min-height:100vh;margin:auto;padding:14px 14px 26px}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px 3px 12px}.brand{display:flex;align-items:center;gap:9px}.brand .badge{width:40px;height:40px;display:grid;place-items:center;border-radius:15px;background:linear-gradient(135deg,#fff0ad,#ffc64d);font-size:22px;box-shadow:0 7px 16px rgba(204,135,18,.18)}.brand h1{font-size:18px;margin:0;line-height:1.12}.brand p{font-size:11px;font-weight:800;color:#83738f;margin:3px 0 0}.score{min-width:88px;text-align:center;background:#fff;border:2px solid #ffe2a5;border-radius:18px;padding:7px 9px;font-weight:900;box-shadow:0 8px 18px rgba(90,56,15,.07)}.score b{font-size:19px;color:#ef8a19}.video-wrap{position:relative;overflow:hidden;border-radius:30px;background:#241b23;box-shadow:var(--shadow);aspect-ratio:9/16}.video-wrap video{width:100%;height:100%;display:block;object-fit:cover;background:#241b23}.intro,.done{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;padding:22px;text-align:center;background:linear-gradient(180deg,rgba(31,19,31,.12),rgba(31,19,31,.76))}.intro-card,.done-card{width:100%;border-radius:28px;background:rgba(255,255,255,.93);padding:22px 18px;box-shadow:0 14px 30px rgba(0,0,0,.22)}.intro-card h2,.done-card h2{margin:7px 0;font-size:28px;line-height:1.22}.intro-card p,.done-card p{margin:0 0 15px;color:#71657b;line-height:1.55;font-weight:650}.intro-card .mini{font-size:12px;color:#9c87a1}.start{width:100%;border-radius:18px;background:linear-gradient(135deg,var(--gold),var(--orange));padding:15px 16px;color:#fff;font-size:19px;font-weight:950;box-shadow:0 10px 22px rgba(255,125,72,.35)}.hidden{display:none!important}.hud{position:absolute;z-index:4;left:12px;right:12px;top:12px;display:flex;justify-content:space-between;pointer-events:none}.hud .pill{background:rgba(31,19,31,.38);backdrop-filter:blur(7px);color:#fff;padding:7px 10px;border-radius:999px;font-size:12px;font-weight:900;text-shadow:0 1px 2px rgba(0,0,0,.32)}.prompt{position:absolute;z-index:5;left:12px;right:12px;bottom:15px;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}.prompt .speech{max-width:92%;background:rgba(255,255,255,.95);border-radius:20px;padding:10px 14px;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,.18);font-weight:900;font-size:16px;line-height:1.28}.choices{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;pointer-events:auto}.choice{min-width:94px;padding:10px 12px;border:3px solid #fff;border-radius:20px;background:#fff;color:var(--ink);box-shadow:0 8px 16px rgba(0,0,0,.18);font-size:15px;font-weight:950;transform:translateY(12px);opacity:0;animation:rise .23s ease-out forwards}.choice:nth-child(2){animation-delay:.05s}.choice:nth-child(3){animation-delay:.1s}.choice:active{transform:scale(.96)}.choice.ok{background:#eaf9d9;border-color:#97db70}.choice.no{background:#fff0ec;border-color:#ff9c81}.hotspot{position:absolute;z-index:5;pointer-events:auto;border:4px solid rgba(255,255,255,.9);background:rgba(255,217,78,.16);border-radius:50%;box-shadow:0 0 0 8px rgba(255,217,78,.22),0 0 24px rgba(255,255,255,.75);animation:pulse 1s infinite}.hotspot:after{content:"點我";position:absolute;left:50%;top:-31px;transform:translateX(-50%);white-space:nowrap;background:#fff;color:#8f5a0e;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:950;box-shadow:0 4px 11px rgba(0,0,0,.18)}.star{position:absolute;z-index:8;font-size:40px;pointer-events:none;animation:burst .8s ease-out forwards}.lesson-card{background:#fff;border-radius:25px;margin-top:13px;padding:16px;box-shadow:0 10px 24px rgba(70,49,36,.08)}.lesson-card .eyebrow{margin:0 0 4px;color:#ef8a19;font-size:11px;font-weight:950;letter-spacing:.7px}.lesson-card h3{margin:0 0 7px;font-size:21px}.lesson-card p{margin:0;color:#70677c;font-size:14px;line-height:1.55}.words{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.word{background:#fff1cf;border-radius:999px;padding:7px 10px;font-weight:900;font-size:12px;color:#9b6116}.tip{font-size:11px;text-align:center;color:#897a90;margin:13px 6px 0}.retry{margin-top:6px;background:#f5e8ff;color:#7b4aaa;border-radius:15px;padding:12px 15px;font-weight:950}.progress{height:8px;border-radius:999px;overflow:hidden;background:#f4e5d0;margin-top:10px}.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:inherit;transition:width .2s linear}@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.7}}@keyframes rise{to{transform:translateY(0);opacity:1}}@keyframes burst{0%{transform:translate(-50%,-50%) scale(.3);opacity:0}35%{opacity:1}100%{transform:translate(-50%,-160%) scale(1.35) rotate(18deg);opacity:0}}@media(min-width:560px){body{padding:18px}.app{border-radius:34px;box-shadow:0 20px 60px rgba(76,44,18,.2);background:#fffaf1}.video-wrap{border-radius:34px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="top"><div class="brand"><div class="badge">⭐</div><div><h1>林律英文小冒險</h1><p>第 1 集｜Hello, Banana & Dog</p></div></div><div class="score">⭐ <b id="score">0</b></div></header>
    <section class="video-wrap" id="stage">
      <video id="video" playsinline preload="auto" poster="assets/cover.jpg"><source src="assets/ep1-lite.mp4" type="video/mp4" />你的裝置無法播放影片。</video>
      <div class="hud"><div class="pill" id="status">準備出發</div><div class="pill" id="time">0:00 / 1:00</div></div>
      <div class="prompt hidden" id="prompt"></div>
      <div class="intro" id="intro"><div class="intro-card"><div style="font-size:44px">👋🍌🐶</div><h2>邊看、邊點、邊學！</h2><p>影片不會因為答題停下來。看到任務時，直接點選或抓住發亮的目標。</p><button class="start" id="start">開始第 1 集 ▶</button><p class="mini">第一次按開始後會先載入影片；建議使用 Wi‑Fi。</p></div></div>
      <div class="done hidden" id="done"><div class="done-card"><div style="font-size:56px">🏆</div><h2>Good job!</h2><p id="summary">今天完成了小冒險。</p><button class="start" id="again">再玩一次 ▶</button></div></div>
    </section>
    <section class="lesson-card"><p class="eyebrow">不停片互動模式</p><h3 id="title">點開始，跟著動畫一起玩。</h3><p id="detail">看到互動泡泡時，直接點答案。沒點到也沒關係，影片會繼續播放。</p><div class="progress"><span id="bar"></span></div><div class="words"><span class="word">👋 HELLO＝你好</span><span class="word">🍌 BANANA＝香蕉</span><span class="word">🐶 DOG＝狗狗</span></div></section>
    <p class="tip">學習紀錄只存在這支手機的瀏覽器，不上傳帳號、照片或錄音。</p>
  </main>
<script>
(() => {
  const v=document.querySelector('#video'), prompt=document.querySelector('#prompt'), intro=document.querySelector('#intro'), done=document.querySelector('#done');
  const scoreEl=document.querySelector('#score'), statusEl=document.querySelector('#status'), timeEl=document.querySelector('#time'), titleEl=document.querySelector('#title'), detailEl=document.querySelector('#detail'), bar=document.querySelector('#bar'), summary=document.querySelector('#summary');
  const store='lin-adventure-ep1-score-v2'; let score=0, started=false; const fired=new Set();
  const tasks=[
    {id:'hello', at:10.4, until:15.0, type:'choices', title:'看到 HELLO 了！點「Hello」', detail:'Hello＝你好。跟著動畫一起揮揮手。', answers:[['👋 Hello',1],['🍌 Banana',0],['🐶 Dog',0]]},
    {id:'banana', at:22.0, until:29.0, type:'hotspot', title:'找找看香蕉在哪裡？', detail:'看到香蕉時，直接點發亮圈圈。', rect:{left:'61%',top:'36%',width:'24%',height:'16%'}},
    {id:'dog', at:36.8, until:42.4, type:'choices', title:'哪一個是 Dog？', detail:'Dog＝狗狗。點狗狗卡片。', answers:[['🐦 Bird',0],['🐶 Dog',1],['🦋 Butterfly',0]]},
    {id:'good', at:51.4, until:57.8, type:'hotspot', title:'抓住 Good Job 星星！', detail:'點發亮星星，收下今天的獎勵。', rect:{left:'39%',top:'22%',width:'22%',height:'14%'}}
  ];
  function getBest(){try{return +localStorage.getItem(store)||0}catch{return 0}}
  function setBest(n){try{localStorage.setItem(store,String(Math.max(getBest(),n)))}catch{}}
  function tone(ok=true){try{const C=window.AudioContext||window.webkitAudioContext; const c=new C(); const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=ok?740:190;g.gain.setValueAtTime(.0001,c.currentTime);g.gain.exponentialRampToValueAtTime(.11,c.currentTime+.015);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+.24);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+.25)}catch{}}
  function burst(x,y){const s=document.createElement('div');s.className='star';s.textContent='⭐';s.style.left=x+'px';s.style.top=y+'px';document.querySelector('#stage').appendChild(s);setTimeout(()=>s.remove(),850)}
  function award(x,y){score++;scoreEl.textContent=score;tone(true);burst(x,y);titleEl.textContent='答對了！Good job!';detailEl.textContent='影片繼續播放，下一個任務快來了。';}
  function clearPrompt(){prompt.classList.add('hidden');prompt.innerHTML=''}
  function renderTask(t){clearPrompt(); prompt.classList.remove('hidden');statusEl.textContent='小任務出現！';titleEl.textContent=t.title;detailEl.textContent=t.detail;
    if(t.type==='choices'){prompt.innerHTML='<div class="speech">'+t.title+'</div><div class="choices"></div>';const row=prompt.querySelector('.choices');t.answers.forEach(([text,ok])=>{const b=document.createElement('button');b.className='choice';b.textContent=text;b.onclick=(e)=>{const r=b.getBoundingClientRect(),stage=document.querySelector('#stage').getBoundingClientRect();if(ok){b.classList.add('ok');award(r.left-stage.left+r.width/2,r.top-stage.top+r.height/2);clearPrompt()}else{b.classList.add('no');tone(false);setTimeout(()=>b.classList.remove('no'),350)}};row.appendChild(b)});
    } else {const h=document.createElement('button');h.className='hotspot';Object.assign(h.style,t.rect);h.setAttribute('aria-label',t.title);h.onclick=(e)=>{const r=h.getBoundingClientRect(),stage=document.querySelector('#stage').getBoundingClientRect();award(r.left-stage.left+r.width/2,r.top-stage.top+r.height/2);clearPrompt()};prompt.appendChild(h);const sp=document.createElement('div');sp.className='speech';sp.textContent=t.title;prompt.appendChild(sp)}
  }
  function start(){score=0;scoreEl.textContent='0';fired.clear();started=true;done.classList.add('hidden');intro.classList.add('hidden');v.currentTime=0;v.play().catch(()=>{intro.classList.remove('hidden')});statusEl.textContent='動畫播放中';titleEl.textContent='邊看、邊點、邊學！';detailEl.textContent='動畫不會暫停。看到任務就直接點。'}
  document.querySelector('#start').onclick=start;document.querySelector('#again').onclick=start;
  v.addEventListener('timeupdate',()=>{const t=v.currentTime;timeEl.textContent=`${Math.floor(t/60)}:${String(Math.floor(t%60)).padStart(2,'0')} / 1:00`;bar.style.width=Math.min(t/60*100,100)+'%';tasks.forEach(task=>{if(!fired.has(task.id)&&t>=task.at&&t<=task.until){fired.add(task.id);renderTask(task)}});if(tasks.some(x=>fired.has(x.id))&&t>0)statusEl.textContent=prompt.classList.contains('hidden')?'動畫播放中':'小任務出現！';if(!prompt.classList.contains('hidden')){const current=tasks.find(x=>fired.has(x.id)&&t>=x.at&&t<=x.until);if(!current||t>current.until)clearPrompt()}});
  v.addEventListener('ended',()=>{clearPrompt();setBest(score);summary.textContent=`這次拿到 ${score} 顆星星。最高紀錄：${getBest()} 顆。`;done.classList.remove('hidden');statusEl.textContent='完成！';titleEl.textContent='今天完成第 1 集！';detailEl.textContent='明天再玩一次，英文會越來越熟。'});
})();
</script>
</body>
</html>
